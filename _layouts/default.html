<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% if page.title %}
    <title>{{ page.title }} | {{ site.title }}</title>
  {% else %}
    <title>{{ site.title }}</title>
  {% endif %}
  <link rel="stylesheet" href="{{ site.baseurl }}/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="{{ site.baseurl }}/" class="logo">{{ site.title }}</a>
      <nav>
        <ul>
          <li><a href="{{ site.baseurl }}/" {% if page.url == "/" %}class="active"{% endif %}>Home</a></li>
          <li><a href="{{ site.baseurl }}/about/" {% if page.url == "/about/" %}class="active"{% endif %}>About</a></li>
          <li><a href="{{ site.baseurl }}/publications/" {% if page.url == "/publications/" %}class="active"{% endif %}>Publications</a></li>
          <li><a href="{{ site.baseurl }}/blog/" {% if page.url == "/blog/" %}class="active"{% endif %}>Blog</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. Built with Jekyll & Decap CMS.</p>
    </div>
  </footer>
</body>
</html>
