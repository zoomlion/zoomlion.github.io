---
layout: default
---

<a href="{{ site.baseurl }}/blog/" class="back-link">← Back to Blog</a>

<article>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.author %}· {{ page.author }}{% endif %}
    </p>
  </div>

  <div class="post-content">
    {{ content }}
  </div>
</article>
