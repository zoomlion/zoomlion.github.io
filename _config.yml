title: "Your Name"
description: "Academic website and blog"
author: "Your Name"
url: "https://zoomlion.github.io"
baseurl: ""

# Build settings
markdown: kramdown
permalink: /:title/
timezone: UTC

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Default values
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

# Navigation
navigation:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Publications
    url: /publications/
  - title: Blog
    url: /blog/

# Social links (replace with your actual links)
social:
  - name: Google Scholar
    url: "#"
  - name: Twitter
    url: "#"
  - name: GitHub
    url: "#"
  - name: Email
    url: "mailto:your.email@university.edu"

# Sass
sass:
  style: compressed
